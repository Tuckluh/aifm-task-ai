# ============================
# DataSource ? MySQL
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/ai_focus_manager?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true

# ============================
# Hugging Face API Key
# Set your key here OR export HF_API_KEY as an environment variable
# ============================
huggingface.api.key=${HF_API_KEY}

# ============================
# Spring MVC ? handle LocalDateTime from HTML form inputs
# ============================
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm